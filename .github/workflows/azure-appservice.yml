name: Deploy to Azure App Service

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: npm run build

      - name: Prepare App Service package
        run: |
          cp server.js public/server.js
          echo '{"name":"focussound","version":"1.0.0","scripts":{"start":"node server.js"}}' > public/package.json

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: waws-prod-hk1-037.ftp.azurewebsites.windows.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /site/wwwroot/
          protocol: ftps
