name: Deploy to Azure App Service

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: npm run build

      - name: Prepare App Service package
        run: |
          cp server.js public/server.js
          echo '{"name":"focussound","version":"1.0.0","scripts":{"start":"node server.js"}}' > public/package.json
          cd public && zip -r ../deploy.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name focussound \
            --resource-group rg-lipcoding-dev \
            --src-path deploy.zip \
            --type zip \
            --async true
