<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>계산기</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #19191d;
        --bg-2: #2d2b3a;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-strong: rgba(255, 255, 255, 0.12);
        --text: #f4f1ea;
        --muted: rgba(244, 241, 234, 0.68);
        --accent: #ffb86b;
        --button: rgba(255, 255, 255, 0.09);
        --button-hover: rgba(255, 255, 255, 0.16);
        --danger: #ff7a7a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 184, 107, 0.22), transparent 28%),
          radial-gradient(circle at bottom right, rgba(127, 173, 255, 0.18), transparent 32%),
          linear-gradient(135deg, var(--bg), var(--bg-2));
      }

      main {
        width: min(92vw, 420px);
        padding: 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        padding: 0 0.25rem;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.8rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .hint {
        margin: 0;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .display {
        margin-bottom: 1rem;
        padding: 1.1rem 1rem 0.95rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        background: rgba(0, 0, 0, 0.18);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .expression {
        min-height: 1.5rem;
        text-align: right;
        font-size: 1rem;
        color: var(--muted);
        word-break: break-all;
      }

      .result {
        min-height: 4.5rem;
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        margin-top: 0.35rem;
        text-align: right;
        font-size: clamp(2.4rem, 8vw, 3.6rem);
        line-height: 1;
        font-variant-numeric: tabular-nums;
        word-break: break-all;
      }

      .keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.75rem;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 18px;
        min-height: 64px;
        font: inherit;
        font-size: 1.1rem;
        color: var(--text);
        background: var(--button);
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease;
      }

      button:hover {
        background: var(--button-hover);
      }

      button:active {
        transform: translateY(1px) scale(0.99);
      }

      .operator {
        color: var(--accent);
      }

      .danger {
        color: var(--danger);
      }

      .wide {
        grid-column: span 2;
      }

      .equals {
        background: linear-gradient(135deg, rgba(255, 184, 107, 0.9), rgba(255, 122, 122, 0.9));
        color: #17171b;
        font-weight: 700;
      }

      .equals:hover {
        background: linear-gradient(135deg, rgba(255, 200, 132, 0.95), rgba(255, 140, 140, 0.95));
      }
    </style>
  </head>
  <body>
    <h1 style="position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);margin:0;font-size:1.6rem;font-weight:700;color:#ffb86b;letter-spacing:0.05em;text-shadow:0 2px 16px rgba(255,184,107,0.4);">Hello World 👋</h1>

    <main aria-label="계산기">
      <div class="title-row">
        <p class="eyebrow">Calculator</p>
        <p class="hint">Enter 없음</p>
      </div>

      <section class="display" aria-live="polite" aria-atomic="true">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </section>

      <section class="keys" aria-label="계산기 버튼">
        <button class="danger" data-action="clear">AC</button>
        <button class="danger" data-action="backspace">⌫</button>
        <button class="operator" data-value="%">%</button>
        <button class="operator" data-value="/">÷</button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="operator" data-value="*">×</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="operator" data-value="-">−</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="operator" data-value="+">+</button>

        <button class="wide" data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="equals" data-action="equals">=</button>
      </section>
    </main>

    <script>
      const expressionEl = document.getElementById("expression");
      const resultEl = document.getElementById("result");
      const buttons = document.querySelectorAll("button");

      let expression = "";

      const formatExpression = (value) =>
        value
          .replaceAll("*", "×")
          .replaceAll("/", "÷");

      const updateDisplay = () => {
        expressionEl.textContent = formatExpression(expression);
        resultEl.textContent = expression || "0";
      };

      const appendValue = (value) => {
        expression += value;
        updateDisplay();
      };

      const clearAll = () => {
        expression = "";
        updateDisplay();
      };

      const backspace = () => {
        expression = expression.slice(0, -1);
        updateDisplay();
      };

      const evaluate = () => {
        if (!expression) {
          return;
        }

        try {
          const sanitized = expression.replaceAll("÷", "/").replaceAll("×", "*");
          const value = Function(`"use strict"; return (${sanitized});`)();
          expression = String(Number.isFinite(value) ? value : "Error");
        } catch {
          expression = "Error";
        }

        resultEl.textContent = expression;
        expressionEl.textContent = "";
      };

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const value = button.dataset.value;
          const action = button.dataset.action;

          if (value) {
            appendValue(value);
            return;
          }

          if (action === "clear") {
            clearAll();
            return;
          }

          if (action === "backspace") {
            backspace();
            return;
          }

          if (action === "equals") {
            evaluate();
          }
        });
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          return;
        }

        if (/^[0-9]$/.test(event.key) || ["+", "-", "*", "/", ".", "%"].includes(event.key)) {
          appendValue(event.key);
          return;
        }

        if (event.key === "Backspace") {
          backspace();
          return;
        }

        if (event.key === "Escape") {
          clearAll();
        }
      });

      updateDisplay();
    </script>
  </body>
</html>
