<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusRound</title>
  <style>
    :root {
      --bg: #19191d;
      --bg2: #2d2b3a;
      --panel: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #f4f1ea;
      --muted: rgba(244,241,234,0.55);
      --accent: #ffb86b;
      --green: #4cff91;
      --red: #ff7a7a;
      --blue: #7fb8ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(255,184,107,0.18), transparent 30%),
                  radial-gradient(circle at bottom right, rgba(127,173,255,0.14), transparent 30%),
                  linear-gradient(135deg, var(--bg), var(--bg2));
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .view { display: none; width: min(92vw, 440px); }
    .view.active { display: block; }

    /* ── 공통 카드 ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem 1.75rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); letter-spacing: .04em; margin-bottom: .25rem; }
    .subtitle { font-size: .85rem; color: var(--muted); margin-bottom: 1.75rem; }

    /* ── 입력 필드 ── */
    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .4rem; }
    .field input {
      width: 100%; padding: .65rem .9rem;
      background: rgba(0,0,0,0.22); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font: inherit; font-size: 1rem;
    }
    .field input:focus { outline: none; border-color: var(--accent); }

    /* ── 버튼 ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: .75rem 1.5rem; border: none; border-radius: 14px;
      font: inherit; font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: transform 100ms ease, filter 100ms ease;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: linear-gradient(135deg, #ffb86b, #ff7a7a); color: #17171b; width: 100%; margin-top: .5rem; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost { background: var(--panel); border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-sm { padding: .5rem 1rem; font-size: .88rem; border-radius: 10px; }

    /* ── 타이머 뷰 ── */
    .round-label { font-size: .78rem; text-transform: uppercase; letter-spacing: .15em; color: var(--muted); text-align: center; margin-bottom: .5rem; }
    .state-badge {
      display: inline-block; padding: .3rem 1rem; border-radius: 20px;
      font-size: .8rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .state-focus { background: rgba(255,184,107,0.18); color: var(--accent); }
    .state-break { background: rgba(127,184,255,0.18); color: var(--blue); }

    .timer-display {
      font-size: clamp(3.5rem, 14vw, 5rem); font-weight: 700; font-variant-numeric: tabular-nums;
      text-align: center; line-height: 1; margin-bottom: 1.25rem;
      transition: color .3s;
    }
    .timer-display.focus-color { color: var(--accent); }
    .timer-display.break-color { color: var(--blue); }

    .unfocus-row { text-align: center; font-size: .82rem; color: var(--red); margin-bottom: 1.5rem; min-height: 1.2em; }

    .cam-row { display: flex; gap: .75rem; align-items: flex-start; margin-bottom: 1.25rem; }
    .cam-wrap {
      position: relative; width: 130px; flex-shrink: 0;
      border-radius: 10px; overflow: hidden; background: #000;
      border: 1px solid var(--border);
    }
    #camVideo { width: 130px; height: 98px; object-fit: cover; display: block; transform: scaleX(-1); }
    .cam-status {
      position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      font-size: .65rem; background: rgba(0,0,0,.6); color: #fff; padding: 2px 6px; border-radius: 10px;
      white-space: nowrap;
    }
    .cam-info { font-size: .78rem; color: var(--muted); line-height: 1.6; }
    .cam-info strong { color: var(--text); }

    .timer-btns { display: flex; gap: .6rem; }
    .timer-btns .btn { flex: 1; }

    /* ── 리포트 뷰 ── */
    .report-title { font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: .25rem; }
    .report-sub { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 1.5rem; }
    .stat-row { display: flex; gap: .75rem; margin-bottom: 1rem; }
    .stat-box {
      flex: 1; border-radius: 14px; padding: 1rem; text-align: center;
    }
    .stat-box .stat-val { font-size: 1.6rem; font-weight: 700; }
    .stat-box .stat-lbl { font-size: .75rem; color: var(--muted); margin-top: .2rem; }
    .stat-box.green { background: rgba(76,255,145,0.1); }
    .stat-box.green .stat-val { color: var(--green); }
    .stat-box.red { background: rgba(255,122,122,0.1); }
    .stat-box.red .stat-val { color: var(--red); }
    .rate-bar-wrap { margin-bottom: 1.25rem; }
    .rate-bar-label { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-bottom: .35rem; }
    .rate-bar { height: 8px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
    .rate-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--green), var(--accent)); transition: width 1s ease; }
    .report-detail { font-size: .8rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<!-- ① 세팅 뷰 -->
<div id="viewSetup" class="view active">
  <div class="card">
    <h1>🥊 FocusRound</h1>
    <p class="subtitle">라운드를 설정하고 집중을 시작하세요</p>
    <div class="field">
      <label>라운드 수</label>
      <input id="cfgRounds" type="number" min="1" max="20" value="4" />
    </div>
    <div class="field">
      <label>집중 시간 (분)</label>
      <input id="cfgFocus" type="number" min="1" max="120" value="25" />
    </div>
    <div class="field">
      <label>휴식 시간 (분)</label>
      <input id="cfgBreak" type="number" min="1" max="60" value="5" />
    </div>
    <button class="btn btn-primary" onclick="startSession()">▶ 시작</button>
  </div>
</div>

<!-- ② 타이머 뷰 -->
<div id="viewTimer" class="view">
  <div class="card">
    <div class="round-label" id="roundLabel">Round 1 / 4</div>
    <div style="text-align:center">
      <span class="state-badge state-focus" id="stateBadge">집중</span>
    </div>
    <div class="timer-display focus-color" id="timerDisplay">25:00</div>
    <div class="unfocus-row" id="unfocusRow"></div>
    <div class="cam-row">
      <div class="cam-wrap">
        <video id="camVideo" autoplay muted playsinline></video>
        <div class="cam-status" id="camStatus">🟡 초기화 중</div>
      </div>
      <div class="cam-info">
        <strong id="infoState">집중 중</strong><br>
        비집중 <span id="infoUnfocus">0초</span> 누계<br>
        감지 <span id="infoCount">0</span>회
      </div>
    </div>
    <div class="timer-btns">
      <button class="btn btn-ghost btn-sm" id="btnPause" onclick="togglePause()">일시정지</button>
      <button class="btn btn-ghost btn-sm" onclick="endSession()">종료</button>
    </div>
  </div>
</div>

<!-- ③ 리포트 뷰 -->
<div id="viewReport" class="view">
  <div class="card">
    <div class="report-title">세션 완료 🎉</div>
    <div class="report-sub" id="reportSub"></div>
    <div class="stat-row">
      <div class="stat-box green">
        <div class="stat-val" id="rFocus">—</div>
        <div class="stat-lbl">실제 집중</div>
      </div>
      <div class="stat-box red">
        <div class="stat-val" id="rUnfocus">—</div>
        <div class="stat-lbl">비집중</div>
      </div>
    </div>
    <div class="rate-bar-wrap">
      <div class="rate-bar-label">
        <span>집중률</span><span id="rRate">—</span>
      </div>
      <div class="rate-bar"><div class="rate-bar-fill" id="rBar" style="width:0%"></div></div>
    </div>
    <div class="report-detail" id="rDetail"></div>
    <button class="btn btn-primary" onclick="resetSession()">🔄 다시 시작</button>
  </div>
</div>

<script type="module">
// ══════════════════════════════════════════════
//  Web Audio — 소리 생성
// ══════════════════════════════════════════════
const ctx = new (window.AudioContext || window.webkitAudioContext)();

// 복싱 벨 — 비조화 배음으로 금속 종소리 재현
// 실제 타악기형 금속 종은 2.756x, 5.4x 등 비틀린 배음을 가짐
function boxingBell(delayMs = 0, vol = 1.0) {
  const t = ctx.currentTime + delayMs / 1000;
  // [주파수, 상대 볼륨, 감쇠(초)] — 기본음 860Hz 기준
  const partials = [
    [860,   1.00, 3.0],   // 기본음 (가장 길게 울림)
    [2370,  0.55, 2.0],   // 2.756배 배음
    [4640,  0.25, 1.3],   // 5.4배 배음
    [6880,  0.12, 0.8],   // 8배 배음 (고음 쨍함)
    [860,   0.30, 0.05],  // 타격 충격음 (아주 짧은 초기 burst)
  ];
  partials.forEach(([freq, amp, decay]) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    // 고역 배음은 약간의 노이즈 질감
    osc.type = freq > 4000 ? 'triangle' : 'sine';
    osc.frequency.value = freq;
    osc.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(amp * vol * 0.35, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + decay);
    osc.start(t); osc.stop(t + decay + 0.05);
  });
}

// 타격 충격음 (벨 채로 칠 때 나는 "퉁" 소리)
function bellStrike(delayMs = 0) {
  const t = ctx.currentTime + delayMs / 1000;
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.value = 0.15;
  src.connect(gain); gain.connect(ctx.destination);
  src.start(t);
}

// 복싱 벨 1타 (타격음 + 벨음 동시)
function strike(delayMs = 0, vol = 1.0) {
  bellStrike(delayMs);
  boxingBell(delayMs, vol);
}

function soundFocusStart() { // 집중 시작 — 3타 연속 (0.2초 간격)
  strike(0);
  strike(200);
  strike(400);
}
function soundBreakStart() { // 휴식 시작 — 1타
  strike(0, 0.85);
}
function soundAlert() {      // 비집중 경보 — 낮고 둔탁한 버저
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = 120;
  osc.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
  osc.start(t); osc.stop(t + 0.65);
}
function soundFinish() {     // 전체 완료 — 3타 후 여운
  strike(0);
  strike(200);
  strike(400);
  strike(1000, 0.7);  // 마지막 타 — 여운
}

// ══════════════════════════════════════════════
//  세션 상태
// ══════════════════════════════════════════════
let cfg = {};
let session = {};
let timerInterval = null;
let paused = false;

// 비집중 감지용
let unfocusSec = 0;       // 비집중 누계(초)
let unfocusCount = 0;     // 감지 횟수
let stillSec = 0;         // 연속 무움직임(초)
let absentSec = 0;        // 연속 미감지(초)
const STILL_THRESH = 60;  // 멍함 판정 임계(초)
const ABSENT_THRESH = 10; // 자리이탈 판정 임계(초)
let alertedThisStreak = false; // 한 연속 구간에 경보 1회

// ══════════════════════════════════════════════
//  뷰 전환
// ══════════════════════════════════════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════════════════════════
//  세션 시작
// ══════════════════════════════════════════════
window.startSession = function () {
  if (ctx.state === 'suspended') ctx.resume();
  cfg = {
    rounds: parseInt(document.getElementById('cfgRounds').value) || 4,
    focusSec: (parseInt(document.getElementById('cfgFocus').value) || 25) * 60,
    breakSec: (parseInt(document.getElementById('cfgBreak').value) || 5) * 60,
  };
  session = { round: 1, phase: 'focus', remaining: cfg.focusSec, totalSec: 0 };
  unfocusSec = 0; unfocusCount = 0; stillSec = 0; absentSec = 0; alertedThisStreak = false;
  paused = false;
  showView('viewTimer');
  updateTimerUI();
  soundFocusStart();
  startCam();
  timerInterval = setInterval(tick, 1000);
};

// ══════════════════════════════════════════════
//  타이머 tick
// ══════════════════════════════════════════════
function tick() {
  if (paused) return;
  session.remaining--;
  session.totalSec++;
  updateTimerUI();

  if (session.remaining <= 0) {
    if (session.phase === 'focus') {
      if (session.round >= cfg.rounds) {
        finishSession(); return;
      }
      session.phase = 'break';
      session.remaining = cfg.breakSec;
      soundBreakStart();
    } else {
      session.round++;
      session.phase = 'focus';
      session.remaining = cfg.focusSec;
      soundFocusStart();
    }
    updateTimerUI();
  }
}

function updateTimerUI() {
  const m = String(Math.floor(session.remaining / 60)).padStart(2, '0');
  const s = String(session.remaining % 60).padStart(2, '0');
  const display = document.getElementById('timerDisplay');
  const badge = document.getElementById('stateBadge');
  document.getElementById('roundLabel').textContent = `Round ${session.round} / ${cfg.rounds}`;
  display.textContent = `${m}:${s}`;
  if (session.phase === 'focus') {
    display.className = 'timer-display focus-color';
    badge.className = 'state-badge state-focus'; badge.textContent = '집중';
  } else {
    display.className = 'timer-display break-color';
    badge.className = 'state-badge state-break'; badge.textContent = '휴식';
  }
  document.getElementById('unfocusRow').textContent =
    unfocusSec > 0 ? `비집중 누계: ${fmtSec(unfocusSec)}` : '';
  document.getElementById('infoUnfocus').textContent = fmtSec(unfocusSec);
  document.getElementById('infoCount').textContent = unfocusCount;
}

// ══════════════════════════════════════════════
//  일시정지 / 종료
// ══════════════════════════════════════════════
window.togglePause = function () {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '▶ 재개' : '일시정지';
};

window.endSession = function () {
  finishSession();
};

// ══════════════════════════════════════════════
//  세션 종료 & 리포트
// ══════════════════════════════════════════════
function finishSession() {
  clearInterval(timerInterval);
  stopCam();
  soundFinish();
  const total = session.totalSec;
  const unfocus = unfocusSec;
  const focus = Math.max(0, total - unfocus);
  const rate = total > 0 ? Math.round((focus / total) * 100) : 100;

  document.getElementById('rFocus').textContent = fmtSec(focus);
  document.getElementById('rUnfocus').textContent = fmtSec(unfocus);
  document.getElementById('rRate').textContent = `${rate}%`;
  document.getElementById('rBar').style.width = `${rate}%`;
  document.getElementById('reportSub').textContent =
    `${cfg.rounds}라운드 완료 · 총 ${fmtSec(total)}`;
  document.getElementById('rDetail').textContent =
    `비집중 감지 ${unfocusCount}회`;

  // LocalStorage 저장
  try {
    const rec = { date: new Date().toISOString(), totalSec: total, focusSec: focus, unfocusSec: unfocus, unfocusCount, focusRate: rate };
    const hist = JSON.parse(localStorage.getItem('focusround_history') || '[]');
    hist.push(rec); localStorage.setItem('focusround_history', JSON.stringify(hist.slice(-100)));
  } catch {}

  showView('viewReport');
}

window.resetSession = function () {
  showView('viewSetup');
};

// ══════════════════════════════════════════════
//  웹캠 + MediaPipe FaceMesh
// ══════════════════════════════════════════════
let camStream = null;
let faceMesh = null;
let camInterval = null;
let prevLandmarks = null;

async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
    document.getElementById('camVideo').srcObject = camStream;
    setCamStatus('🟡 AI 로딩 중');
    await loadFaceMesh();
    setCamStatus('🟢 감지됨');
    camInterval = setInterval(analyzeCam, 1000);
  } catch (e) {
    setCamStatus('🔴 카메라 없음');
  }
}

async function loadFaceMesh() {
  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js';
    script.onload = async () => {
      faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
      faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
      faceMesh.onResults(onFaceMeshResults);
      await faceMesh.initialize();
      resolve();
    };
    document.head.appendChild(script);
  });
}

let lastResults = null;
function onFaceMeshResults(results) { lastResults = results; }

async function analyzeCam() {
  if (paused || !faceMesh) return;
  const video = document.getElementById('camVideo');
  try { await faceMesh.send({ image: video }); } catch {}

  const results = lastResults;
  if (!results || !results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
    // 얼굴 미감지
    absentSec++;
    stillSec = 0;
    prevLandmarks = null;
    if (absentSec >= ABSENT_THRESH) {
      if (!alertedThisStreak) { soundAlert(); unfocusCount++; alertedThisStreak = true; }
      unfocusSec++;
      document.getElementById('infoState').textContent = '자리 이탈';
      setCamStatus('🔴 미감지');
    } else {
      setCamStatus('🟡 찾는 중');
    }
    return;
  }

  // 얼굴 감지됨
  absentSec = 0;
  setCamStatus('🟢 감지됨');
  const lm = results.multiFaceLandmarks[0];

  if (prevLandmarks) {
    let movement = 0;
    for (let i = 0; i < lm.length; i++) {
      movement += Math.abs(lm[i].x - prevLandmarks[i].x) + Math.abs(lm[i].y - prevLandmarks[i].y);
    }
    const movementScore = movement * 1000;

    if (movementScore < 2.5) { // 무움직임 임계
      stillSec++;
      if (stillSec >= STILL_THRESH) {
        if (!alertedThisStreak) { soundAlert(); unfocusCount++; alertedThisStreak = true; }
        unfocusSec++;
        document.getElementById('infoState').textContent = '🔴 멍함';
      } else {
        document.getElementById('infoState').textContent = '🟢 집중 중';
      }
    } else {
      if (stillSec >= STILL_THRESH) alertedThisStreak = false;
      stillSec = 0;
      alertedThisStreak = false;
      document.getElementById('infoState').textContent = '🟢 집중 중';
    }
  }
  prevLandmarks = lm.map(p => ({ x: p.x, y: p.y }));
}

function stopCam() {
  clearInterval(camInterval);
  if (faceMesh) { try { faceMesh.close(); } catch {} faceMesh = null; }
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  prevLandmarks = null;
}

function setCamStatus(text) {
  document.getElementById('camStatus').textContent = text;
}

// ══════════════════════════════════════════════
//  유틸
// ══════════════════════════════════════════════
function fmtSec(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return m > 0 ? `${m}분 ${s}초` : `${s}초`;
}
</script>
</body>
</html>
